services:
  postgres:
    image: postgres:16
    container_name: proyecto-postgres-db
    restart: always
    environment:
      POSTGRES_DB: proyecto_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
